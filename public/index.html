<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contraband Multijoueur</title>
</head>
<body style="background:#111;color:white;font-family:sans-serif;padding:20px">

<h1>Contraband – Multijoueur</h1>

<div id="menu">
  <h2>Créer un lobby</h2>
  <input id="playerName" placeholder="Ton pseudo"><br><br>
  <button onclick="createLobby()">Créer</button>

  <h2>Rejoindre un lobby</h2>
  <input id="joinCode" placeholder="Code du lobby"><br><br>
  <button onclick="joinLobby()">Rejoindre</button>
</div>

<div id="lobby" style="display:none">
  <h2>Lobby : <span id="lobbyCode"></span></h2>
  <h3>Joueurs :</h3>
  <ul id="playerList"></ul>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// Création lobby
function createLobby() {
  socket.emit("createLobby", {
    playerName: document.getElementById("playerName").value,
    startATM: 200,
    startThird: 50,
    maxCarry: 100
  });
}

// Rejoindre lobby
function joinLobby() {
  socket.emit("joinLobby", {
    code: document.getElementById("joinCode").value,
    playerName: document.getElementById("playerName").value
  });
}

socket.on("lobbyCreated", (code) => {
  document.getElementById("menu").style.display = "none";
  document.getElementById("lobby").style.display = "block";
  document.getElementById("lobbyCode").textContent = code;
});

socket.on("lobbyUpdate", (lobby) => {
  const list = document.getElementById("playerList");
  list.innerHTML = "";
  lobby.players.forEach(p => {
    const li = document.createElement("li");
    li.textContent = p.name;
    list.appendChild(li);
  });
});
</script>

</body>
</html>
