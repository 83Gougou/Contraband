<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contrebande</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#121212;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#ffd700;
}

.box{
    background:#1f1f1f;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
}

button{
    background:#ffd700;
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    width:100%;
}

button:hover{
    opacity:0.9;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.team{
    background:#252525;
    padding:15px;
    border-radius:15px;
}

.money{
    color:#4cff4c;
    font-size:22px;
    font-weight:bold;
}

.result{
    font-size:22px;
    text-align:center;
    margin-top:20px;
}

</style>
</head>

<body>

<h1>💼 CONTREBANDE</h1>

<div class="box">

<h2>Création du Lobby</h2>

<label>Argent ATM de départ</label>
<input id="startATM" type="number" value="300">

<label>Argent Banque Internationale</label>
<input id="startBank" type="number" value="100">

<label>Nombre de manches</label>
<input id="rounds" type="number" value="50">

<label>Transport maximum</label>
<input id="maxTransport" type="number" value="100">

<button onclick="startGame()">Créer la partie</button>

</div>

<div id="game" style="display:none;">

<div class="grid">

<div class="team">

<h2>🔵 Nord</h2>

ATM :
<div class="money" id="northATM"></div>

Banque :
<div class="money" id="northBank"></div>

</div>

<div class="team">

<h2>🔴 Sud</h2>

ATM :
<div class="money" id="southATM"></div>

Banque :
<div class="money" id="southBank"></div>

</div>

</div>

<div class="box">

<h2>Tour actuel</h2>

<div id="turnInfo"></div>

<br>

<label>Montant transporté</label>
<input id="smuggleAmount" type="number">

<label>Doute du douanier</label>
<input id="doubtAmount" type="number">

<button onclick="playTurn()">Valider le tour</button>

</div>

<div class="result" id="result"></div>

</div>

<script>

let game = {};

function startGame(){

game = {

northATM: Number(startATM.value),
southATM: Number(startATM.value),

northBank: Number(startBank.value),
southBank: Number(startBank.value),

maxTransport:Number(maxTransport.value),

rounds:Number(rounds.value),

currentRound:1,

currentTeam:"north"

};

updateUI();

document.getElementById("game").style.display="block";

}

function updateUI(){

northATM.innerText=game.northATM;
southATM.innerText=game.southATM;

northBank.innerText=game.northBank;
southBank.innerText=game.southBank;

turnInfo.innerHTML=
"Manche "+game.currentRound+
" / "+game.rounds+
"<br><br>"+
(game.currentTeam==="north" ?
"🔵 Le Nord fait passer de l'argent"
:
"🔴 Le Sud fait passer de l'argent");

}

function playTurn(){

let amount = Number(smuggleAmount.value);
let doubt = Number(doubtAmount.value);

if(amount<0){
alert("Montant invalide");
return;
}

if(amount > game.maxTransport){
alert("Maximum : "+game.maxTransport);
return;
}

if(game.currentTeam==="north"){

if(amount>game.northATM){
alert("Pas assez d'argent.");
return;
}

game.northATM-=amount;

if(doubt>=amount){

game.southBank+=amount;

}else{

game.northBank+=amount;

let indemnity=Math.floor((amount-doubt)/2);

game.northBank+=indemnity;

}

}else{

if(amount>game.southATM){
alert("Pas assez d'argent.");
return;
}

game.southATM-=amount;

if(doubt>=amount){

game.northBank+=amount;

}else{

game.southBank+=amount;

let indemnity=Math.floor((amount-doubt)/2);

game.southBank+=indemnity;

}

}

if(game.currentTeam==="north"){
game.currentTeam="south";
}else{
game.currentTeam="north";
game.currentRound++;
}

if(game.currentRound>game.rounds){

endGame();
return;

}

updateUI();

smuggleAmount.value="";
doubtAmount.value="";

}

function endGame(){

game.northBank += Math.floor(game.southATM/2);
game.southBank += Math.floor(game.northATM/2);

let winner="";

if(game.northBank>game.southBank){

winner="🏆 Victoire du Nord";

}else if(game.southBank>game.northBank){

winner="🏆 Victoire du Sud";

}else{

winner="🤝 Egalité";

}

result.innerHTML=
winner+
"<br><br>"+
"Nord : "+game.northBank+
"<br>"+
"Sud : "+game.southBank;

}

</script>

</body>
</html>
