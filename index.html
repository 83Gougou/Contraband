<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Contraband – Jeu</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
    }
    .page {
      display: none;
      padding: 20px;
    }
    .active {
      display: block;
    }
    h1, h2 {
      margin-top: 0;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
    .green { background: #2ea043; color: white; }
    .blue { background: #218bff; color: white; }
    .red { background: #f85149; color: white; }
    .card {
      background: #161b22;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid #30363d;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: white;
    }
    .row {
      display: flex;
      gap: 20px;
    }
    .mallette {
      width: 180px;
      height: 120px;
      background: #8b5a2b;
      border: 4px solid #5a3a1a;
      border-radius: 8px;
      margin: 20px auto;
      position: relative;
    }
    .mallette::after {
      content: "💼";
      font-size: 60px;
      position: absolute;
      top: 20px;
      left: 55px;
    }
    .log {
      background: #161b22;
      border: 1px solid #30363d;
      padding: 10px;
      height: 200px;
      overflow-y: auto;
      border-radius: 6px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<!-- PAGE 1 : LOBBY -->
<div id="page-lobby" class="page active">
  <h1>Créer un lobby</h1>

  <div class="card">
    <label>Argent ATM par joueur (max 300)</label>
    <input id="atmStart" type="number" value="150" max="300">

    <label>Argent Pays Neutre par joueur</label>
    <input id="thirdStart" type="number" value="50">

    <label>Prêt à rembourser</label>
    <input id="loan" type="number" value="40">

    <label>Nombre de manches</label>
    <input id="rounds" type="number" value="10">
  </div>

  <button class="green" onclick="goToWaiting()">Créer la partie</button>
</div>

<!-- PAGE 2 : SALLE D’ATTENTE -->
<div id="page-waiting" class="page">
  <h1>Salle d’attente</h1>

  <div class="card">
    <label>Smuggler (contrebandier)</label>
    <select id="smugglerSelect">
      <option value="north">Pays Nord</option>
      <option value="south">Pays Sud</option>
    </select>

    <label>Douanier</label>
    <select id="inspectorSelect">
      <option value="south">Pays Sud</option>
      <option value="north">Pays Nord</option>
    </select>
  </div>

  <button class="blue" onclick="startGame()">Commencer la partie</button>
</div>

<!-- PAGE 3 : JEU -->
<div id="page-game" class="page">
  <h1>Manche <span id="roundNumber"></span></h1>

  <div class="row">
    <div class="card" style="flex:1;">
      <h2>Smuggler</h2>
      <p id="smugglerTeamText"></p>

      <label>Mettre dans la mallette (max 100)</label>
      <input id="smuggleAmount" type="number" value="0" max="100">

      <button class="green" onclick="prepareMallette()">Préparer la mallette</button>
    </div>

    <div class="card" style="flex:1;">
      <h2>Douanier</h2>
      <p id="inspectorTeamText"></p>

      <button class="blue" onclick="actionPass()">PASS</button>

      <label>Montant pour DOUTE</label>
      <input id="doubtAmount" type="number" value="0" max="100">

      <button class="red" onclick="actionDoubt()">DOUTE</button>
    </div>
  </div>

  <div class="mallette"></div>

  <h2>Journal</h2>
  <div class="log" id="logBox"></div>

  <button class="blue" onclick="nextRound()">Manche suivante</button>
</div>

<script>
  // STATE
  const state = {
    config: {},
    round: 1,
    smuggler: "north",
    inspector: "south",
    mallette: 0,
    teams: {
      north: { atm: 0, third: 0 },
      south: { atm: 0, third: 0 }
    }
  };

  function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function goToWaiting() {
    state.config = {
      atm: Number(document.getElementById("atmStart").value),
      third: Number(document.getElementById("thirdStart").value),
      loan: Number(document.getElementById("loan").value),
      rounds: Number(document.getElementById("rounds").value)
    };

    state.teams.north.atm = state.config.atm;
    state.teams.south.atm = state.config.atm;
    state.teams.north.third = state.config.third;
    state.teams.south.third = state.config.third;

    showPage("page-waiting");
  }

  function startGame() {
    state.smuggler = document.getElementById("smugglerSelect").value;
    state.inspector = document.getElementById("inspectorSelect").value;

    document.getElementById("smugglerTeamText").textContent =
      "Équipe : " + (state.smuggler === "north" ? "Pays Nord" : "Pays Sud");

    document.getElementById("inspectorTeamText").textContent =
      "Équipe : " + (state.inspector === "north" ? "Pays Nord" : "Pays Sud");

    document.getElementById("roundNumber").textContent = state.round;

    showPage("page-game");
  }

  function log(msg) {
    const box = document.getElementById("logBox");
    box.innerHTML += "<div>• " + msg + "</div>";
    box.scrollTop = box.scrollHeight;
  }

  function prepareMallette() {
    const amount = Number(document.getElementById("smuggleAmount").value);
    if (amount > 100) return log("Impossible : max 100.");
    if (state.teams[state.smuggler].atm < amount) return log("Pas assez d'argent dans l'ATM.");

    state.teams[state.smuggler].atm -= amount;
    state.mallette = amount;

    log("Le smuggler prépare une mallette avec " + amount + " unités.");
  }

  function actionPass() {
    if (state.mallette > 0) {
      state.teams[state.smuggler].third += state.mallette;
      log("PASS : " + state.mallette + " unités passent au pays neutre.");
    } else {
      log("PASS : mallette vide, rien ne se passe.");
    }
    state.mallette = 0;
  }

  function actionDoubt() {
    const doubt = Number(document.getElementById("doubtAmount").value);

    if (state.mallette === 0) {
      const indemnity = Math.floor(doubt / 2);
      state.teams[state.smuggler].third += indemnity;
      log("DOUTE raté : mallette vide → indemnité " + indemnity);
    } else {
      if (doubt >= state.mallette) {
        state.teams[state.inspector].third += state.mallette;
        log("DOUTE réussi : le douanier prend " + state.mallette);
      } else {
        const indemnity = state.mallette - doubt;
        state.teams[state.smuggler].third += state.mallette + indemnity;
        log("DOUTE raté : smuggler gagne " + state.mallette + " + indemnité " + indemnity);
      }
    }

    state.mallette = 0;
  }

  function nextRound() {
    state.round++;
    if (state.round > state.config.rounds) {
      log("FIN DE PARTIE !");
      return;
    }
    document.getElementById("roundNumber").textContent = state.round;
    log("Nouvelle manche.");
  }
</script>

</body>
</html>
